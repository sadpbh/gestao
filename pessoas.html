<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pessoas · Cobertura de Escalas · SAD BH</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="supabase-client.js"></script>
<script src="auth.js"></script>
<script src="nav.js"></script>
</head>
<body>

<div class="topbar">
  <div>
    <h1>Pessoas</h1>
    <div class="sub">Cobertura de Escalas &middot; SAD BH</div>
  </div>
  <div id="nav-menu"></div>
  <div class="topbar-user">
    <span id="user-label"></span>
    <button class="btn-sair" onclick="authLogout()">Sair</button>
  </div>
</div>

<div class="container" id="app" style="display:none">

  <div class="card" id="card-restrito" style="display:none">
    <p class="msg-erro">Esta tela é restrita ao perfil gestor.</p>
  </div>

  <div id="conteudo-gestor" style="display:none">

    <div class="card">
      <h2>Nova pessoa</h2>
      <div id="form-erro"></div>

      <div class="form-row">
        <div class="form-field" style="flex:2">
          <label>Nome completo</label>
          <input id="np-nome" type="text">
        </div>
        <div class="form-field">
          <label>Categoria</label>
          <select id="np-categoria">
            <option value="medico">Médico</option>
            <option value="enfermeiro">Enfermeiro</option>
            <option value="tecnico_enfermagem">Técnico de Enfermagem</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>Conselho (CRM/COREN)</label>
          <input id="np-conselho" type="text" placeholder="COREN 123456">
        </div>
        <div class="form-field">
          <label>CPF</label>
          <input id="np-cpf" type="text" placeholder="000.000.000-00">
        </div>
      </div>

      <hr class="divisor">
      <label style="font-size:13px;font-weight:600;display:block;margin-bottom:10px">Contrato inicial (BM/M)</label>
      <div class="form-row">
        <div class="form-field">
          <label>BM/M</label>
          <input id="np-bmm" type="text">
        </div>
        <div class="form-field">
          <label>Tipo de contrato</label>
          <select id="np-tipo-contrato">
            <option value="efetivo">Efetivo (sem término)</option>
            <option value="contrato">Contrato (com término)</option>
          </select>
        </div>
        <div class="form-field" id="np-campo-termino" style="display:none">
          <label>Data de término</label>
          <input id="np-termino" type="date">
        </div>
      </div>

      <hr class="divisor">
      <label style="font-size:13px;font-weight:600;display:block;margin-bottom:10px">Lotação</label>
      <div class="form-row">
        <div class="form-field">
          <label>Equipe</label>
          <select id="np-equipe">
            <option value="">Ferista (sem equipe fixa)</option>
          </select>
        </div>
        <div class="form-field" id="np-campo-turno">
          <label>Turno</label>
          <select id="np-turno">
            <option value="MANHA">Manhã</option>
            <option value="TARDE">Tarde</option>
          </select>
        </div>
        <div class="form-field">
          <label>Horário de trabalho</label>
          <input id="np-horario" type="text" placeholder="07 ÀS 19">
        </div>
      </div>
      <div class="form-field">
        <label>Dias da semana</label>
        <div class="checkbox-dias" id="np-dias">
          <label><input type="checkbox" value="seg" checked> Seg</label>
          <label><input type="checkbox" value="ter" checked> Ter</label>
          <label><input type="checkbox" value="qua" checked> Qua</label>
          <label><input type="checkbox" value="qui" checked> Qui</label>
          <label><input type="checkbox" value="sex" checked> Sex</label>
          <label><input type="checkbox" value="sab"> Sáb</label>
          <label><input type="checkbox" value="dom"> Dom</label>
        </div>
      </div>
      <div class="form-field" style="margin-top:10px">
        <label><input id="np-rotativa" type="checkbox" style="width:auto"> Escala rotativa (plantão, ex: 12x36 — pode cair em fim de semana via rodízio)</label>
      </div>

      <div style="margin-top:16px">
        <button class="btn-primario" onclick="salvarPessoa()">Salvar pessoa</button>
      </div>
    </div>

    <div class="card">
      <div class="form-row" style="align-items:end;margin-bottom:16px">
        <div class="form-field">
          <label>Buscar por nome</label>
          <input id="busca-nome" type="text" placeholder="Digite para filtrar..." oninput="renderTabela()">
        </div>
      </div>
      <h2>Pessoas cadastradas (<span id="contador-pessoas">0</span>)</h2>
      <div id="pessoas-grupos"></div>
      <div id="tabela-vazio" class="msg-vazio" style="display:none">Nenhuma pessoa encontrada.</div>
    </div>

  </div>
</div>

<div id="modal-pessoa-container"></div>

<script>
var equipesCache = [];
var pessoasCache = [];
var linhaExpandidaId = null;

var DIA_LABEL = { seg: 'Seg', ter: 'Ter', qua: 'Qua', qui: 'Qui', sex: 'Sex', sab: 'Sáb', dom: 'Dom' };
var CATEGORIA_LABEL = { medico: 'Médico', enfermeiro: 'Enfermeiro', tecnico_enfermagem: 'Técnico de Enfermagem' };

function initTela() {
  document.getElementById('app').style.display = 'block';
  var acesso = window.meuAcesso;
  var rotulo = acesso.equipe_nome || acesso.pessoa_nome || acesso.email;
  document.getElementById('user-label').textContent = rotulo + ' (' + acesso.perfil + ')';
  renderNav('pessoas');

  if (acesso.perfil !== 'gestor') {
    document.getElementById('card-restrito').style.display = 'block';
    return;
  }
  document.getElementById('conteudo-gestor').style.display = 'block';

  document.getElementById('np-tipo-contrato').addEventListener('change', function () {
    document.getElementById('np-campo-termino').style.display =
      this.value === 'contrato' ? 'block' : 'none';
  });

  document.getElementById('np-categoria').addEventListener('change', atualizarOpcoesTurno);
  atualizarOpcoesTurno();

  carregarEquipes().then(function () {
    carregarPessoas();
  });
}

function atualizarOpcoesTurno() {
  var categoria = document.getElementById('np-categoria').value;
  var wrap = document.getElementById('np-campo-turno');
  var sel = document.getElementById('np-turno');
  if (categoria === 'tecnico_enfermagem') {
    wrap.style.display = 'none';
  } else if (categoria === 'enfermeiro') {
    wrap.style.display = 'block';
    sel.innerHTML = '<option value="MANHA">Manhã</option><option value="INTER">Intermediário (10h-16h)</option><option value="TARDE">Tarde</option>';
  } else {
    wrap.style.display = 'block';
    sel.innerHTML = '<option value="MANHA">Manhã</option><option value="TARDE">Tarde</option>';
  }
}

function carregarEquipes() {
  return supabaseClient.from('equipes').select('id, nome').order('nome').then(function (res) {
    equipesCache = res.data || [];
    var sel = document.getElementById('np-equipe');
    sel.innerHTML = '<option value="">Ferista (sem equipe fixa)</option>' +
      equipesCache.map(function (e) { return '<option value="' + e.id + '">' + e.nome + '</option>'; }).join('');
  });
}

function carregarPessoas() {
  supabaseClient
    .from('pessoas')
    .select('id, nome, categoria, conselho, cpf, ativo, motivo_inativacao, data_inativacao, contratos(id, bm_m, tipo_contrato, data_termino_contrato, ativo, lotacoes(id, equipe_id, turno, horario_trabalho, dias_semana, escala_rotativa, equipes(nome)))')
    .order('nome')
    .then(function (res) {
      if (res.error) {
        document.getElementById('form-erro').innerHTML =
          '<p class="msg-erro">Erro ao carregar pessoas: ' + res.error.message + '</p>';
        return;
      }
      pessoasCache = res.data || [];
      renderTabela();
    });
}

function equipesDaPessoaLista(p) {
  var vistos = {};
  var lista = [];
  (p.contratos || []).forEach(function (c) {
    (c.lotacoes || []).forEach(function (l) {
      if (l.equipe_id && !vistos[l.equipe_id]) {
        vistos[l.equipe_id] = true;
        lista.push(l.equipes ? l.equipes.nome : '');
      }
    });
  });
  return lista;
}

function renderTabela() {
  var termo = document.getElementById('busca-nome').value.trim();
  termo = normalizarTexto(termo);
  var lista = pessoasCache.filter(function (p) {
    return !termo || normalizarTexto(p.nome).indexOf(termo) !== -1;
  });

  document.getElementById('contador-pessoas').textContent = lista.length;
  var container = document.getElementById('pessoas-grupos');
  var vazio = document.getElementById('tabela-vazio');

  if (lista.length === 0) {
    container.innerHTML = '';
    vazio.style.display = 'block';
    return;
  }
  vazio.style.display = 'none';

  var ativos = lista.filter(function (p) { return p.ativo; });
  var inativos = lista.filter(function (p) { return !p.ativo; });

  var grupos = {};
  ativos.forEach(function (p) {
    var equipesP = equipesDaPessoaLista(p);
    if (equipesP.length === 0) equipesP = ['Feristas / sem equipe fixa'];
    equipesP.forEach(function (nomeEquipe) {
      if (!grupos[nomeEquipe]) grupos[nomeEquipe] = [];
      grupos[nomeEquipe].push(p);
    });
  });

  var nomesGrupos = Object.keys(grupos).sort(function (a, b) {
    if (a === 'Feristas / sem equipe fixa') return 1;
    if (b === 'Feristas / sem equipe fixa') return -1;
    return a.localeCompare(b);
  });

  var html = nomesGrupos.map(function (nomeGrupo) {
    var linhasHtml = grupos[nomeGrupo].map(function (p) { return linhaPessoaHtml(p); }).join('');
    return '<div style="margin-bottom:22px">' +
      '<h3 style="font-size:13px;color:var(--texto-suave);margin-bottom:8px">' + nomeGrupo + ' (' + grupos[nomeGrupo].length + ')</h3>' +
      '<table><thead><tr><th>Nome</th><th>Categoria</th><th>CPF</th><th>Status</th><th></th></tr></thead>' +
      '<tbody>' + linhasHtml + '</tbody></table>' +
      '</div>';
  }).join('');

  if (inativos.length > 0) {
    html += '<hr class="divisor">' +
      '<h3 style="font-size:13px;color:var(--texto-suave);margin-bottom:8px">Histórico — Inativos (' + inativos.length + ')</h3>' +
      '<table><thead><tr><th>Nome</th><th>Categoria</th><th>Motivo</th><th>Data</th><th></th></tr></thead>' +
      '<tbody>' + inativos.map(function (p) {
        return '<tr>' +
          '<td>' + p.nome + '</td>' +
          '<td>' + CATEGORIA_LABEL[p.categoria] + '</td>' +
          '<td>' + (p.motivo_inativacao || '—') + '</td>' +
          '<td>' + (p.data_inativacao ? p.data_inativacao.split('-').reverse().join('/') : '—') + '</td>' +
          '<td><button class="btn-icon" onclick="alternarAtivo(\'' + p.id + '\',false)">Reativar</button></td>' +
          '</tr>';
      }).join('') + '</tbody></table>';
  }

  container.innerHTML = html;
}

function linhaPessoaHtml(p) {
  var html = '<tr class="linha-pessoa" onclick="toggleDetalhe(\'' + p.id + '\')">' +
    '<td>' + p.nome + '</td>' +
    '<td>' + CATEGORIA_LABEL[p.categoria] + '</td>' +
    '<td>' + (p.cpf || '—') + '</td>' +
    '<td><span class="badge ' + (p.ativo ? 'badge-ativo' : 'badge-inativo') + '">' + (p.ativo ? 'Ativo' : 'Inativo') + '</span></td>' +
    '<td>' +
      '<button class="btn-icon" onclick="event.stopPropagation();abrirEdicaoPessoa(\'' + p.id + '\')">Editar</button> ' +
      '<button class="btn-icon" onclick="event.stopPropagation();alternarAtivo(\'' + p.id + '\',' + p.ativo + ')">' + (p.ativo ? 'Desativar' : 'Ativar') + '</button>' +
    '</td>' +
    '</tr>';
  if (linhaExpandidaId === p.id) {
    html += '<tr class="linha-detalhe"><td colspan="5">' + renderDetalhePessoa(p) + '</td></tr>';
  }
  return html;
}

function renderDetalhePessoa(p) {
  var contratos = p.contratos || [];
  if (contratos.length === 0) {
    return '<p class="msg-vazio">Sem contrato cadastrado.</p>';
  }
  var html = '';
  contratos.forEach(function (c) {
    html += '<div class="contrato-bloco">' +
      '<div class="cabecalho">' +
        '<span class="bm">BM/M ' + c.bm_m + ' &middot; ' + (c.tipo_contrato === 'efetivo' ? 'Efetivo' : 'Contrato') +
        (c.data_termino_contrato ? ' (até ' + c.data_termino_contrato + ')' : '') + '</span>' +
      '</div>';
    (c.lotacoes || []).forEach(function (l) {
      var diasHtml = (l.dias_semana || []).map(function (d) {
        return '<span class="dia-chip ativo-dia">' + DIA_LABEL[d] + '</span>';
      }).join('');
      html += '<div class="lotacao-linha">' +
        '<strong>' + (l.equipes ? l.equipes.nome : 'Ferista') + '</strong>' +
        (l.turno ? '<span class="dia-chip ativo-dia">' + (l.turno === 'MANHA' ? 'Manhã' : l.turno === 'INTER' ? 'Inter' : 'Tarde') + '</span>' : '') +
        '<span>' + (l.horario_trabalho || '—') + '</span>' +
        '<span class="dias-chips">' + diasHtml + '</span>' +
        (l.escala_rotativa ? '<span class="dia-chip">Rotativa</span>' : '') +
        '</div>';
    });
    html += '</div>';
  });
  html += '<button class="link-acao" onclick="event.stopPropagation();mostrarFormNovoContrato(\'' + p.id + '\')">+ Adicionar outro contrato</button>' +
    '<div id="form-contrato-' + p.id + '"></div>';
  return html;
}

function toggleDetalhe(id) {
  linhaExpandidaId = (linhaExpandidaId === id) ? null : id;
  renderTabela();
}

function alternarAtivo(id, ativoAtual) {
  if (ativoAtual) {
    var motivo = prompt('Motivo do desligamento/inativação:');
    if (motivo === null) return;
    supabaseClient.from('pessoas').update({
      ativo: false, motivo_inativacao: motivo || null, data_inativacao: new Date().toISOString().slice(0, 10)
    }).eq('id', id).then(function (res) {
      if (res.error) { alert('Erro: ' + res.error.message); return; }
      carregarPessoas();
    });
  } else {
    supabaseClient.from('pessoas').update({
      ativo: true, motivo_inativacao: null, data_inativacao: null
    }).eq('id', id).then(function (res) {
      if (res.error) { alert('Erro: ' + res.error.message); return; }
      carregarPessoas();
    });
  }
}

function abrirEdicaoPessoa(id) {
  var p = pessoasCache.find(function (x) { return x.id === id; });
  if (!p) return;
  var container = document.getElementById('modal-pessoa-container');
  container.innerHTML =
    '<div class="modal-overlay" onclick="if(event.target===this) fecharEdicaoPessoa()">' +
      '<div class="modal-card">' +
        '<button class="modal-fechar" onclick="fecharEdicaoPessoa()">&times;</button>' +
        '<h3>Editar pessoa</h3>' +
        '<div id="edicao-pessoa-erro"></div>' +
        '<div class="form-field"><label>Nome</label><input id="ep-nome" type="text" value="' + p.nome.replace(/"/g, '&quot;') + '"></div>' +
        '<div class="form-field"><label>Categoria</label><select id="ep-categoria">' +
          '<option value="medico"' + (p.categoria === 'medico' ? ' selected' : '') + '>Médico</option>' +
          '<option value="enfermeiro"' + (p.categoria === 'enfermeiro' ? ' selected' : '') + '>Enfermeiro</option>' +
          '<option value="tecnico_enfermagem"' + (p.categoria === 'tecnico_enfermagem' ? ' selected' : '') + '>Técnico de Enfermagem</option>' +
        '</select></div>' +
        '<div class="form-field"><label>Conselho</label><input id="ep-conselho" type="text" value="' + (p.conselho || '') + '"></div>' +
        '<div class="form-field"><label>CPF</label><input id="ep-cpf" type="text" value="' + (p.cpf || '') + '"></div>' +
        '<div class="form-field"><label><input id="ep-ativo" type="checkbox" style="width:auto"' + (p.ativo ? ' checked' : '') + '> Ativo</label></div>' +
        '<button class="btn-primario" onclick="salvarEdicaoPessoa(\'' + id + '\')">Salvar</button>' +
      '</div>' +
    '</div>';
}

function fecharEdicaoPessoa() {
  document.getElementById('modal-pessoa-container').innerHTML = '';
}

function salvarEdicaoPessoa(id) {
  var nome = document.getElementById('ep-nome').value.trim();
  var categoria = document.getElementById('ep-categoria').value;
  var conselho = document.getElementById('ep-conselho').value.trim() || null;
  var cpf = document.getElementById('ep-cpf').value.trim() || null;
  var ativo = document.getElementById('ep-ativo').checked;

  if (!nome) {
    document.getElementById('edicao-pessoa-erro').innerHTML = '<p class="msg-erro">Informe o nome.</p>';
    return;
  }

  supabaseClient.from('pessoas').update({
    nome: nome, categoria: categoria, conselho: conselho, cpf: cpf, ativo: ativo
  }).eq('id', id).then(function (res) {
    if (res.error) {
      document.getElementById('edicao-pessoa-erro').innerHTML = '<p class="msg-erro">Erro: ' + res.error.message + '</p>';
      return;
    }
    fecharEdicaoPessoa();
    carregarPessoas();
  });
}

function mostrarFormNovoContrato(pessoaId) {
  var container = document.getElementById('form-contrato-' + pessoaId);
  var pessoa = pessoasCache.find(function (p) { return p.id === pessoaId; });
  var equipeOptions = '<option value="">Ferista (sem equipe fixa)</option>' +
    equipesCache.map(function (e) { return '<option value="' + e.id + '">' + e.nome + '</option>'; }).join('');
  var turnoOptions = pessoa.categoria === 'enfermeiro'
    ? '<option value="MANHA">Manhã</option><option value="INTER">Intermediário</option><option value="TARDE">Tarde</option>'
    : '<option value="MANHA">Manhã</option><option value="TARDE">Tarde</option>';
  var mostrarTurno = pessoa.categoria !== 'tecnico_enfermagem';

  container.innerHTML =
    '<div class="contrato-bloco" style="background:' + '#fafbfc' + '">' +
    '<div class="form-row">' +
      '<div class="form-field"><label>BM/M</label><input id="nc-bmm-' + pessoaId + '" type="text"></div>' +
      '<div class="form-field"><label>Tipo</label><select id="nc-tipo-' + pessoaId + '">' +
        '<option value="efetivo">Efetivo</option><option value="contrato">Contrato</option></select></div>' +
      '<div class="form-field"><label>Término</label><input id="nc-termino-' + pessoaId + '" type="date"></div>' +
    '</div>' +
    '<div class="form-row">' +
      '<div class="form-field"><label>Equipe</label><select id="nc-equipe-' + pessoaId + '">' + equipeOptions + '</select></div>' +
      (mostrarTurno ? '<div class="form-field"><label>Turno</label><select id="nc-turno-' + pessoaId + '">' + turnoOptions + '</select></div>' : '') +
      '<div class="form-field"><label>Horário</label><input id="nc-horario-' + pessoaId + '" type="text"></div>' +
    '</div>' +
    '<button class="btn-primario" onclick="salvarNovoContrato(\'' + pessoaId + '\')">Salvar contrato</button>' +
    '</div>';
}

function salvarNovoContrato(pessoaId) {
  var bmm = document.getElementById('nc-bmm-' + pessoaId).value.trim();
  var tipo = document.getElementById('nc-tipo-' + pessoaId).value;
  var termino = document.getElementById('nc-termino-' + pessoaId).value || null;
  var equipeId = document.getElementById('nc-equipe-' + pessoaId).value || null;
  var horario = document.getElementById('nc-horario-' + pessoaId).value.trim();
  var turnoEl = document.getElementById('nc-turno-' + pessoaId);
  var turno = turnoEl ? turnoEl.value : null;

  if (!bmm) { alert('Informe o BM/M.'); return; }

  supabaseClient.from('contratos').insert({
    pessoa_id: pessoaId, bm_m: bmm, tipo_contrato: tipo, data_termino_contrato: termino
  }).select().then(function (res) {
    if (res.error) { alert('Erro ao salvar contrato: ' + res.error.message); return; }
    var contratoId = res.data[0].id;
    supabaseClient.from('lotacoes').insert({
      contrato_id: contratoId, equipe_id: equipeId, turno: turno, horario_trabalho: horario,
      dias_semana: ['seg','ter','qua','qui','sex'], escala_rotativa: false
    }).then(function (res2) {
      if (res2.error) { alert('Erro ao salvar lotação: ' + res2.error.message); return; }
      carregarPessoas();
    });
  });
}

function salvarPessoa() {
  var erroEl = document.getElementById('form-erro');
  erroEl.innerHTML = '';

  var nome = document.getElementById('np-nome').value.trim();
  var categoria = document.getElementById('np-categoria').value;
  var conselho = document.getElementById('np-conselho').value.trim() || null;
  var cpf = document.getElementById('np-cpf').value.trim() || null;
  var bmm = document.getElementById('np-bmm').value.trim();
  var tipoContrato = document.getElementById('np-tipo-contrato').value;
  var termino = document.getElementById('np-termino').value || null;
  var equipeId = document.getElementById('np-equipe').value || null;
  var turno = (categoria === 'tecnico_enfermagem') ? null : document.getElementById('np-turno').value;
  var horario = document.getElementById('np-horario').value.trim();
  var rotativa = document.getElementById('np-rotativa').checked;
  var dias = Array.prototype.slice.call(document.querySelectorAll('#np-dias input:checked')).map(function (el) { return el.value; });

  if (!nome) { erroEl.innerHTML = '<p class="msg-erro">Informe o nome.</p>'; return; }
  if (!bmm) { erroEl.innerHTML = '<p class="msg-erro">Informe o BM/M do contrato inicial.</p>'; return; }

  supabaseClient.from('pessoas').insert({
    nome: nome, categoria: categoria, conselho: conselho, cpf: cpf, ativo: true
  }).select().then(function (res) {
    if (res.error) {
      erroEl.innerHTML = '<p class="msg-erro">Erro ao salvar pessoa: ' + res.error.message + '</p>';
      return;
    }
    var pessoaId = res.data[0].id;

    supabaseClient.from('contratos').insert({
      pessoa_id: pessoaId, bm_m: bmm, tipo_contrato: tipoContrato, data_termino_contrato: termino
    }).select().then(function (res2) {
      if (res2.error) {
        erroEl.innerHTML = '<p class="msg-erro">Pessoa criada, mas erro ao salvar contrato: ' + res2.error.message + '</p>';
        return;
      }
      var contratoId = res2.data[0].id;

      supabaseClient.from('lotacoes').insert({
        contrato_id: contratoId, equipe_id: equipeId, turno: turno, horario_trabalho: horario,
        dias_semana: dias, escala_rotativa: rotativa
      }).then(function (res3) {
        if (res3.error) {
          erroEl.innerHTML = '<p class="msg-erro">Contrato criado, mas erro ao salvar lotação: ' + res3.error.message + '</p>';
          return;
        }
        document.getElementById('np-nome').value = '';
        document.getElementById('np-conselho').value = '';
        document.getElementById('np-cpf').value = '';
        document.getElementById('np-bmm').value = '';
        document.getElementById('np-termino').value = '';
        document.getElementById('np-horario').value = '';
        carregarPessoas();
      });
    });
  });
}

authReady(initTela);
</script>
</body>
</html>
