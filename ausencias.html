<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ausências · Cobertura de Escalas · SAD BH</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="supabase-client.js"></script>
<script src="auth.js"></script>
<style>
  .busca-wrap { position: relative; }
  .busca-sugestoes {
    position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid var(--borda);
    border-radius: 8px; margin-top: 4px; max-height: 220px; overflow-y: auto; z-index: 20;
    box-shadow: 0 8px 24px rgba(0,0,0,.08);
  }
  .busca-sugestao-item { padding: 9px 14px; font-size: 13px; cursor: pointer; }
  .busca-sugestao-item:hover { background: var(--bg); }
  .pessoa-selecionada {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #eaf3ee;
    border-radius: 8px; font-size: 14px; margin-bottom: 4px;
  }
  .pessoa-selecionada button { margin-left: auto; }
  .chip-dia { background: var(--bg); border-radius: 6px; padding: 4px 10px; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }
  .chips-dias-avulsos { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .chip-dia button { background: none; border: none; cursor: pointer; color: var(--erro-texto); font-weight: 700; }
  .aviso-ferista { font-size: 12px; color: var(--texto-suave); margin-top: 6px; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>Ausências</h1>
    <div class="sub">Cobertura de Escalas &middot; SAD BH</div>
  </div>
  <div class="topbar-user">
    <span id="user-label"></span>
    <button class="btn-sair" onclick="authLogout()">Sair</button>
  </div>
</div>

<div class="container" id="app" style="display:none">

  <div class="card" id="card-restrito" style="display:none">
    <p class="msg-erro">Esta tela não está disponível para o seu perfil.</p>
  </div>

  <div id="conteudo-form" style="display:none">
    <div class="card">
      <h2>Nova ausência</h2>
      <div id="form-erro"></div>

      <div class="form-field busca-wrap">
        <label>Pessoa</label>
        <div id="pessoa-selecionada-area"></div>
        <input id="busca-pessoa" type="text" placeholder="Digite o nome..." autocomplete="off">
        <div id="busca-sugestoes" class="busca-sugestoes" style="display:none"></div>
      </div>

      <div id="campo-equipe-wrap" style="display:none">
        <div class="form-field">
          <label id="label-equipe">Equipe</label>
          <select id="af-equipe"></select>
          <div id="aviso-ferista" class="aviso-ferista" style="display:none">Esta pessoa é ferista (sem equipe fixa) — selecione a equipe à qual a ausência se refere.</div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label>Motivo</label>
          <select id="af-motivo">
            <option>Férias Regulamentares</option>
            <option>Férias Prêmio</option>
            <option>Licença médica</option>
            <option>Licença maternidade</option>
            <option>Licença paternidade</option>
            <option>Licença Gala</option>
            <option>Vacância do cargo</option>
            <option>Afastamento INSS</option>
            <option>Falta não justificada</option>
            <option>Pausa Contratual</option>
            <option>Folga</option>
            <option>Folga - Serviço Eleitoral</option>
            <option>Outro</option>
          </select>
        </div>
        <div class="form-field" id="campo-turno">
          <label>Turno</label>
          <select id="af-turno">
            <option value="MANHA">Manhã</option>
            <option value="TARDE">Tarde</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label>Tipo de período</label>
          <select id="af-tipo-periodo">
            <option value="continuo">Contínuo (data início - fim)</option>
            <option value="avulso">Dias avulsos</option>
          </select>
        </div>
      </div>

      <div id="periodo-continuo" class="form-row">
        <div class="form-field">
          <label>Data início</label>
          <input id="af-data-inicio" type="date">
        </div>
        <div class="form-field">
          <label>Data fim</label>
          <input id="af-data-fim" type="date">
        </div>
      </div>

      <div id="periodo-avulso" class="form-row" style="display:none">
        <div class="form-field">
          <label>Adicionar dia</label>
          <div style="display:flex;gap:8px">
            <input id="af-dia-avulso" type="date">
            <button class="btn-secundario" onclick="adicionarDiaAvulso()">Adicionar</button>
          </div>
          <div id="chips-dias" class="chips-dias-avulsos"></div>
        </div>
      </div>

      <div class="form-field">
        <label>Observações</label>
        <input id="af-observacoes" type="text">
      </div>

      <div style="margin-top:16px">
        <button class="btn-primario" onclick="salvarAusencia()">Registrar ausência</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="form-row" style="align-items:end;margin-bottom:16px">
      <div class="form-field">
        <label>Buscar por pessoa</label>
        <input id="busca-lista" type="text" placeholder="Digite para filtrar..." oninput="renderTabelaAusencias()">
      </div>
    </div>
    <h2>Ausências registradas (<span id="contador-ausencias">0</span>)</h2>
    <table>
      <thead>
        <tr><th>Pessoa</th><th>Equipe</th><th>Motivo</th><th>Período</th><th>Turno</th><th></th></tr>
      </thead>
      <tbody id="tabela-ausencias-body"></tbody>
    </table>
    <div id="tabela-vazio" class="msg-vazio" style="display:none">Nenhuma ausência encontrada.</div>
  </div>

</div>

<script>
var pessoasCache = [];
var equipesCache = [];
var ausenciasCache = [];
var pessoaSelecionada = null;
var diasAvulsos = [];
var souGestor = false;

var MOTIVO_LABEL_OK = true;

function initTela() {
  document.getElementById('app').style.display = 'block';
  var acesso = window.meuAcesso;
  var rotulo = acesso.equipe_nome || acesso.pessoa_nome || acesso.email;
  document.getElementById('user-label').textContent = rotulo + ' (' + acesso.perfil + ')';

  if (acesso.perfil === 'pessoa') {
    document.getElementById('card-restrito').style.display = 'block';
    return;
  }

  souGestor = acesso.perfil === 'gestor';
  if (souGestor) {
    document.getElementById('conteudo-form').style.display = 'block';
  }

  document.getElementById('af-tipo-periodo').addEventListener('change', function () {
    var continuo = this.value === 'continuo';
    document.getElementById('periodo-continuo').style.display = continuo ? 'flex' : 'none';
    document.getElementById('periodo-avulso').style.display = continuo ? 'none' : 'flex';
  });

  document.getElementById('busca-pessoa').addEventListener('input', onBuscaPessoaInput);
  document.addEventListener('click', function (e) {
    if (!e.target.closest('.busca-wrap')) {
      document.getElementById('busca-sugestoes').style.display = 'none';
    }
  });

  Promise.all([carregarPessoas(), carregarEquipes()]).then(function () {
    carregarAusencias();
  });
}

function carregarPessoas() {
  return supabaseClient
    .from('pessoas')
    .select('id, nome, categoria, ativo, contratos(lotacoes(equipe_id, equipes(nome)))')
    .eq('ativo', true)
    .order('nome')
    .then(function (res) {
      pessoasCache = res.data || [];
    });
}

function carregarEquipes() {
  return supabaseClient.from('equipes').select('id, nome').order('nome').then(function (res) {
    equipesCache = res.data || [];
    document.getElementById('af-equipe').innerHTML = equipesCache.map(function (e) {
      return '<option value="' + e.id + '">' + e.nome + '</option>';
    }).join('');
  });
}

function equipesDaPessoa(pessoa) {
  var vistos = {};
  var lista = [];
  (pessoa.contratos || []).forEach(function (c) {
    (c.lotacoes || []).forEach(function (l) {
      if (l.equipe_id && !vistos[l.equipe_id]) {
        vistos[l.equipe_id] = true;
        lista.push({ id: l.equipe_id, nome: l.equipes ? l.equipes.nome : '' });
      }
    });
  });
  return lista;
}

function onBuscaPessoaInput() {
  var termo = document.getElementById('busca-pessoa').value.trim().toLowerCase();
  var sugestoesEl = document.getElementById('busca-sugestoes');
  if (!termo) { sugestoesEl.style.display = 'none'; return; }

  var resultados = pessoasCache.filter(function (p) {
    return p.nome.toLowerCase().indexOf(termo) !== -1;
  }).slice(0, 8);

  if (resultados.length === 0) {
    sugestoesEl.innerHTML = '<div class="busca-sugestao-item">Nenhuma pessoa encontrada</div>';
  } else {
    sugestoesEl.innerHTML = resultados.map(function (p) {
      return '<div class="busca-sugestao-item" onclick="selecionarPessoa(\'' + p.id + '\')">' + p.nome + '</div>';
    }).join('');
  }
  sugestoesEl.style.display = 'block';
}

function selecionarPessoa(id) {
  pessoaSelecionada = pessoasCache.find(function (p) { return p.id === id; });
  document.getElementById('busca-sugestoes').style.display = 'none';
  document.getElementById('busca-pessoa').value = '';
  document.getElementById('busca-pessoa').style.display = 'none';

  document.getElementById('pessoa-selecionada-area').innerHTML =
    '<div class="pessoa-selecionada">' + pessoaSelecionada.nome +
    '<button class="btn-icon" onclick="limparPessoaSelecionada()">trocar</button></div>';

  var equipesPessoa = equipesDaPessoa(pessoaSelecionada);
  var equipeWrap = document.getElementById('campo-equipe-wrap');
  var avisoFerista = document.getElementById('aviso-ferista');
  var selEquipe = document.getElementById('af-equipe');

  if (equipesPessoa.length === 1) {
    equipeWrap.style.display = 'block';
    avisoFerista.style.display = 'none';
    selEquipe.innerHTML = '<option value="' + equipesPessoa[0].id + '">' + equipesPessoa[0].nome + '</option>';
    selEquipe.disabled = true;
  } else if (equipesPessoa.length > 1) {
    equipeWrap.style.display = 'block';
    avisoFerista.style.display = 'none';
    selEquipe.disabled = false;
    selEquipe.innerHTML = equipesPessoa.map(function (e) {
      return '<option value="' + e.id + '">' + e.nome + '</option>';
    }).join('');
  } else {
    equipeWrap.style.display = 'block';
    avisoFerista.style.display = 'block';
    selEquipe.disabled = false;
    selEquipe.innerHTML = equipesCache.map(function (e) {
      return '<option value="' + e.id + '">' + e.nome + '</option>';
    }).join('');
  }

  var campoTurno = document.getElementById('campo-turno');
  var selTurno = document.getElementById('af-turno');
  if (pessoaSelecionada.categoria === 'tecnico_enfermagem') {
    campoTurno.style.display = 'none';
  } else if (pessoaSelecionada.categoria === 'enfermeiro') {
    campoTurno.style.display = 'block';
    selTurno.innerHTML = '<option value="MANHA">Manhã</option><option value="INTER">Intermediário (10h-16h)</option><option value="TARDE">Tarde</option>';
  } else {
    campoTurno.style.display = 'block';
    selTurno.innerHTML = '<option value="MANHA">Manhã</option><option value="TARDE">Tarde</option>';
  }
}

function limparPessoaSelecionada() {
  pessoaSelecionada = null;
  document.getElementById('pessoa-selecionada-area').innerHTML = '';
  document.getElementById('busca-pessoa').style.display = 'block';
  document.getElementById('busca-pessoa').value = '';
  document.getElementById('campo-equipe-wrap').style.display = 'none';
}

function adicionarDiaAvulso() {
  var val = document.getElementById('af-dia-avulso').value;
  if (!val) return;
  if (diasAvulsos.indexOf(val) === -1) diasAvulsos.push(val);
  diasAvulsos.sort();
  renderChipsDias();
  document.getElementById('af-dia-avulso').value = '';
}

function removerDiaAvulso(val) {
  diasAvulsos = diasAvulsos.filter(function (d) { return d !== val; });
  renderChipsDias();
}

function renderChipsDias() {
  document.getElementById('chips-dias').innerHTML = diasAvulsos.map(function (d) {
    return '<span class="chip-dia">' + d + ' <button onclick="removerDiaAvulso(\'' + d + '\')">&times;</button></span>';
  }).join('');
}

function gerarDiasContinuo(inicio, fim) {
  var dias = [];
  var atual = new Date(inicio + 'T00:00:00');
  var fimData = new Date(fim + 'T00:00:00');
  while (atual <= fimData) {
    dias.push(atual.toISOString().slice(0, 10));
    atual.setDate(atual.getDate() + 1);
  }
  return dias;
}

function salvarAusencia() {
  var erroEl = document.getElementById('form-erro');
  erroEl.innerHTML = '';

  if (!pessoaSelecionada) { erroEl.innerHTML = '<p class="msg-erro">Selecione uma pessoa.</p>'; return; }

  var equipeId = document.getElementById('af-equipe').value;
  var motivo = document.getElementById('af-motivo').value;
  var tipoPeriodo = document.getElementById('af-tipo-periodo').value;
  var ehTecnico = pessoaSelecionada.categoria === 'tecnico_enfermagem';
  var turno = ehTecnico ? null : document.getElementById('af-turno').value;
  var observacoes = document.getElementById('af-observacoes').value.trim() || null;

  var dias;
  if (tipoPeriodo === 'continuo') {
    var ini = document.getElementById('af-data-inicio').value;
    var fim = document.getElementById('af-data-fim').value;
    if (!ini || !fim) { erroEl.innerHTML = '<p class="msg-erro">Informe data início e fim.</p>'; return; }
    dias = gerarDiasContinuo(ini, fim);
  } else {
    if (diasAvulsos.length === 0) { erroEl.innerHTML = '<p class="msg-erro">Adicione ao menos um dia.</p>'; return; }
    dias = diasAvulsos;
  }

  supabaseClient.from('ausencias').insert({
    pessoa_id: pessoaSelecionada.id,
    equipe_id: equipeId,
    motivo: motivo,
    tipo_periodo: tipoPeriodo,
    turno: turno,
    dias: dias,
    observacoes: observacoes
  }).then(function (res) {
    if (res.error) {
      erroEl.innerHTML = '<p class="msg-erro">Erro ao salvar: ' + res.error.message + '</p>';
      return;
    }
    limparPessoaSelecionada();
    diasAvulsos = [];
    renderChipsDias();
    document.getElementById('af-observacoes').value = '';
    document.getElementById('af-data-inicio').value = '';
    document.getElementById('af-data-fim').value = '';
    carregarAusencias();
  });
}

function carregarAusencias() {
  supabaseClient
    .from('ausencias')
    .select('id, motivo, tipo_periodo, turno, dias, observacoes, pessoas(nome), equipes(nome)')
    .order('created_at', { ascending: false })
    .then(function (res) {
      if (res.error) {
        document.getElementById('form-erro').innerHTML =
          '<p class="msg-erro">Erro ao carregar ausências: ' + res.error.message + '</p>';
        return;
      }
      ausenciasCache = res.data || [];
      renderTabelaAusencias();
    });
}

function renderTabelaAusencias() {
  var termo = document.getElementById('busca-lista').value.trim().toLowerCase();
  var lista = ausenciasCache.filter(function (a) {
    return !termo || (a.pessoas && a.pessoas.nome.toLowerCase().indexOf(termo) !== -1);
  });

  document.getElementById('contador-ausencias').textContent = lista.length;
  var body = document.getElementById('tabela-ausencias-body');
  var vazio = document.getElementById('tabela-vazio');

  if (lista.length === 0) {
    body.innerHTML = '';
    vazio.style.display = 'block';
    return;
  }
  vazio.style.display = 'none';

  body.innerHTML = lista.map(function (a) {
    var dias = a.dias || [];
    var periodo = dias.length > 1 ? (dias[0] + ' a ' + dias[dias.length - 1] + ' (' + dias.length + ' dias)') : dias[0];
    var acao = souGestor
      ? '<button class="btn-icon excluir" onclick="excluirAusencia(\'' + a.id + '\')">Excluir</button>'
      : '';
    return '<tr>' +
      '<td>' + (a.pessoas ? a.pessoas.nome : '—') + '</td>' +
      '<td>' + (a.equipes ? a.equipes.nome : '—') + '</td>' +
      '<td>' + a.motivo + '</td>' +
      '<td>' + periodo + '</td>' +
      '<td>' + (a.turno || 'Base inteira') + '</td>' +
      '<td>' + acao + '</td>' +
      '</tr>';
  }).join('');
}

function excluirAusencia(id) {
  if (!confirm('Excluir esta ausência?')) return;
  supabaseClient.from('ausencias').delete().eq('id', id).then(function (res) {
    if (res.error) { alert('Erro: ' + res.error.message); return; }
    carregarAusencias();
  });
}

authReady(initTela);
</script>
</body>
</html>
