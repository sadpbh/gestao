<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escala · Cobertura de Escalas · SAD BH</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="supabase-client.js"></script>
<script src="auth.js"></script>
<script src="nav.js"></script>
</head>
<body>

<div class="topbar">
  <div>
    <h1>Escala</h1>
    <div class="sub">Cobertura de Escalas &middot; SAD BH</div>
  </div>
  <div id="nav-menu"></div>
  <div class="topbar-user">
    <span id="user-label"></span>
    <button class="btn-sair" onclick="authLogout()">Sair</button>
  </div>
</div>

<div class="container" id="app" style="display:none;max-width:1400px">

  <div class="card" id="card-restrito" style="display:none">
    <p class="msg-erro">Esta tela não está disponível para o seu perfil.</p>
  </div>

  <div id="conteudo" style="display:none">
    <div class="card">
      <div class="form-row" style="align-items:end">
        <div class="form-field">
          <label>Categoria</label>
          <select id="f-categoria">
            <option value="medico">Médico</option>
            <option value="enfermeiro">Enfermeiro</option>
          </select>
        </div>
        <div class="form-field">
          <label>Mês</label>
          <input id="f-mes" type="month">
        </div>
        <div class="form-field">
          <label>Equipe</label>
          <select id="f-equipe">
            <option value="">Todas as equipes</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <div id="grade-erro"></div>
      <div class="grade-wrap" id="grade-wrap">
        <table class="grade" id="tabela-grade"></table>
      </div>
      <div class="legenda" id="legenda"></div>
      <p style="font-size:11px;color:var(--texto-suave);margin-top:8px">Role para a direita para avançar os meses automaticamente.</p>
    </div>
  </div>
</div>

<div id="modal-dia-container"></div>

<script>
var CODIGO_INFO = {
  'Férias Regulamentares':   { codigo: 'FR',   bg: '#bfe0fb', cor: '#0f4c8f' },
  'Férias Prêmio':           { codigo: 'FP',   bg: '#f5e0a8', cor: '#7a5c10' },
  'Licença médica':          { codigo: 'LM',   bg: '#ddc3f7', cor: '#5b2f90' },
  'Licença maternidade':     { codigo: 'LMA',  bg: '#f7c3dd', cor: '#902f60' },
  'Licença paternidade':     { codigo: 'LP',   bg: '#c3d3f7', cor: '#2f4f90' },
  'Licença Gala':            { codigo: 'LG',   bg: '#b8f0c8', cor: '#16a34a' },
  'Vacância do cargo':       { codigo: 'V',    bg: '#f9c9c2', cor: '#b0301f' },
  'Afastamento INSS':        { codigo: 'INSS', bg: '#d5dbe0', cor: '#42545e' },
  'Falta não justificada':   { codigo: 'FA',   bg: '#fbcda0', cor: '#a2551e' },
  'Pausa Contratual':        { codigo: 'PC',   bg: '#a8e8e0', cor: '#0e6a5e' },
  'Folga':                   { codigo: 'FO',   bg: '#a8e8f5', cor: '#00707c' },
  'Folga - Serviço Eleitoral': { codigo: 'TRE', bg: '#f5e08a', cor: '#8a6d10' },
  'Outro':                   { codigo: 'OUT',  bg: '#d5dbe0', cor: '#42545e' }
};
var CODIGO_NORMAL = { codigo: 'C', bg: '#c8f4da', cor: '#16a34a' };
var MOTIVOS_PERMITEM_EXTRA = ['Férias Prêmio','Folga - Serviço Eleitoral','Licença médica','Licença maternidade','Pausa Contratual','Falta não justificada','Licença Gala'];
var DIA_SEMANA_LETRA = ['D','S','T','Q','Q','S','S']; // getDay(): 0=domingo
var DIA_SEMANA_CODIGO = ['dom','seg','ter','qua','qui','sex','sab'];

var equipesCache = [];
var pessoasCache = [];
var linhasGrade = [];
var ausenciasMes = [];
var alocacoesMes = [];
var diasDoMes = [];
var blocosMeses = []; // [{ mesStr, dias }] — um bloco por mês carregado, na ordem
var ultimoMesCarregado = null;
var carregandoExtensao = false;

function initTela() {
  document.getElementById('app').style.display = 'block';
  var acesso = window.meuAcesso;
  var rotulo = acesso.equipe_nome || acesso.pessoa_nome || acesso.email;
  document.getElementById('user-label').textContent = rotulo + ' (' + acesso.perfil + ')';
  renderNav('escala');

  if (acesso.perfil === 'pessoa') {
    document.getElementById('card-restrito').style.display = 'block';
    return;
  }
  document.getElementById('conteudo').style.display = 'block';

  var hoje = new Date();
  document.getElementById('f-mes').value = hoje.toISOString().slice(0, 7);

  document.getElementById('f-categoria').addEventListener('change', carregarGrade);
  document.getElementById('f-mes').addEventListener('change', carregarGrade);
  document.getElementById('f-equipe').addEventListener('change', renderGrade);

  carregarEquipes().then(function () {
    return carregarGrade();
  }).then(function () {
    return estenderProximoMes();
  }).then(function () {
    return estenderProximoMes();
  });
  renderLegenda();

  document.getElementById('grade-wrap').addEventListener('scroll', function () {
    var el = this;
    if (el.scrollLeft + el.clientWidth >= el.scrollWidth - 150) {
      estenderProximoMes();
    }
  });
}

function renderLegenda() {
  var pares = [['Cobertura normal', CODIGO_NORMAL]].concat(Object.entries(CODIGO_INFO));
  document.getElementById('legenda').innerHTML = pares.map(function (p) {
    var nome = p[0], i = p[1];
    return '<div class="legenda-item" title="' + nome + '"><span class="legenda-cor" style="background:' + i.bg + '"></span>' + i.codigo + '</div>';
  }).join('');
}

function carregarEquipes() {
  return supabaseClient.from('equipes').select('id, nome').order('nome').then(function (res) {
    equipesCache = res.data || [];
    document.getElementById('f-equipe').innerHTML = '<option value="">Todas as equipes</option>' +
      equipesCache.map(function (e) { return '<option value="' + e.id + '">' + e.nome + '</option>'; }).join('');
  });
}

function calcularDiasDoMes(mesStr) {
  var partes = mesStr.split('-');
  var ano = parseInt(partes[0], 10);
  var mes = parseInt(partes[1], 10);
  var ultimoDia = new Date(ano, mes, 0).getDate();
  var dias = [];
  for (var d = 1; d <= ultimoDia; d++) {
    var dataObj = new Date(ano, mes - 1, d);
    var iso = ano + '-' + String(mes).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    dias.push({ iso: iso, numero: d, letra: DIA_SEMANA_LETRA[dataObj.getDay()], dow: dataObj.getDay() });
  }
  return dias;
}

function carregarGrade() {
  var categoria = document.getElementById('f-categoria').value;
  var mesStr = document.getElementById('f-mes').value;
  if (!mesStr) return Promise.resolve();
  ultimoMesCarregado = mesStr;
  diasDoMes = calcularDiasDoMes(mesStr);
  blocosMeses = [{ mesStr: mesStr, dias: diasDoMes }];
  var iniMes = diasDoMes[0].iso;
  var fimMes = diasDoMes[diasDoMes.length - 1].iso;

  var lotacoesQ = supabaseClient
    .from('lotacoes')
    .select('id, turno, equipe_id, dias_semana, equipes(nome), contratos(pessoa_id, pessoas(nome, categoria, ativo))')
    .not('turno', 'is', null)
    .not('equipe_id', 'is', null);

  var ausenciasQ = supabaseClient
    .from('ausencias')
    .select('id, pessoa_id, equipe_id, motivo, turno, dias');

  var alocacoesQ = supabaseClient
    .from('alocacoes')
    .select('id, equipe_id, data, turno, pessoa_id, tipo, pessoas(nome)')
    .gte('data', iniMes)
    .lte('data', fimMes);

  return Promise.all([lotacoesQ, ausenciasQ, alocacoesQ]).then(function (results) {
    var lotacoesRes = results[0], ausenciasRes = results[1], alocacoesRes = results[2];

    if (lotacoesRes.error || ausenciasRes.error || alocacoesRes.error) {
      var msgs = [lotacoesRes.error, ausenciasRes.error, alocacoesRes.error]
        .filter(Boolean).map(function (e) { return e.message; }).join(' | ');
      document.getElementById('grade-erro').innerHTML =
        '<p class="msg-erro">Erro ao carregar dados da grade: ' + msgs + '</p>';
      console.error('lotacoes:', lotacoesRes.error, 'ausencias:', ausenciasRes.error, 'alocacoes:', alocacoesRes.error);
      return;
    }

    linhasGrade = (lotacoesRes.data || [])
      .filter(function (l) {
        return l.contratos && l.contratos.pessoas && l.contratos.pessoas.categoria === categoria;
      })
      .map(function (l) {
        return {
          equipeId: l.equipe_id,
          equipeNome: l.equipes ? l.equipes.nome : '',
          turno: l.turno,
          diasSemana: l.dias_semana || ['seg', 'ter', 'qua', 'qui', 'sex'],
          pessoaId: l.contratos.pessoa_id,
          pessoaNome: l.contratos.pessoas.nome,
          pessoaAtiva: l.contratos.pessoas.ativo
        };
      });

    var ordemTurno = { MANHA: 0, INTER: 1, TARDE: 2 };
    linhasGrade.sort(function (a, b) {
      if (a.equipeNome !== b.equipeNome) return a.equipeNome.localeCompare(b.equipeNome);
      return ordemTurno[a.turno] - ordemTurno[b.turno];
    });

    ausenciasMes = ausenciasRes.data || [];
    alocacoesMes = alocacoesRes.data || [];

    renderGrade();
  });
}

function proximoMesStr(mesStr) {
  var partes = mesStr.split('-');
  var ano = parseInt(partes[0], 10);
  var mes = parseInt(partes[1], 10);
  mes += 1;
  if (mes > 12) { mes = 1; ano += 1; }
  return ano + '-' + String(mes).padStart(2, '0');
}

function estenderProximoMes() {
  if (carregandoExtensao || !ultimoMesCarregado) return Promise.resolve();
  carregandoExtensao = true;

  var novoMesStr = proximoMesStr(ultimoMesCarregado);
  var novosDias = calcularDiasDoMes(novoMesStr);
  var iniMes = novosDias[0].iso;
  var fimMes = novosDias[novosDias.length - 1].iso;

  return supabaseClient
    .from('alocacoes')
    .select('id, equipe_id, data, turno, pessoa_id, tipo, pessoas(nome)')
    .gte('data', iniMes)
    .lte('data', fimMes)
    .then(function (res) {
      carregandoExtensao = false;
      if (res.error) return;
      diasDoMes = diasDoMes.concat(novosDias);
      blocosMeses.push({ mesStr: novoMesStr, dias: novosDias });
      alocacoesMes = alocacoesMes.concat(res.data || []);
      ultimoMesCarregado = novoMesStr;
      renderGrade();
    });
}

function ausenciaPara(pessoaId, turno, dataIso) {
  for (var i = 0; i < ausenciasMes.length; i++) {
    var a = ausenciasMes[i];
    if (a.pessoa_id === pessoaId && a.turno === turno && a.dias && a.dias.indexOf(dataIso) !== -1) {
      return a;
    }
  }
  return null;
}

function alocacoesPara(equipeId, turno, dataIso) {
  return alocacoesMes.filter(function (al) {
    return al.equipe_id === equipeId && al.turno === turno && al.data === dataIso;
  });
}

function nomeMes(mesStr) {
  var NOMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  var partes = mesStr.split('-');
  return NOMES[parseInt(partes[1], 10) - 1] + ' ' + partes[0];
}

function renderGrade() {
  var equipeFiltro = document.getElementById('f-equipe').value;
  var linhas = linhasGrade.filter(function (l) { return !equipeFiltro || l.equipeId === equipeFiltro; });

  var html = '<thead><tr>' +
    '<th class="col-fixa" rowspan="2">Equipe</th><th class="col-fixa col-fixa2" rowspan="2">Turno</th><th class="col-fixa col-fixa3" rowspan="2">Titular</th>';
  blocosMeses.forEach(function (bloco) {
    html += '<th class="col-mes" colspan="' + bloco.dias.length + '">' + nomeMes(bloco.mesStr) + '</th>';
  });
  html += '</tr><tr>';
  diasDoMes.forEach(function (d) {
    html += '<th>' + d.letra + '<br>' + d.numero + '</th>';
  });
  html += '</tr></thead><tbody>';

  if (linhas.length === 0) {
    html += '<tr><td colspan="' + (3 + diasDoMes.length) + '" class="msg-vazio">Nenhum registro para essa categoria/equipe.</td></tr>';
  }

  linhas.forEach(function (l, idx) {
    var novoGrupo = idx === 0 || linhas[idx - 1].equipeNome !== l.equipeNome;
    var qtdNoGrupo = linhas.filter(function (x) { return x.equipeNome === l.equipeNome; }).length;
    var nomeExibido = l.equipeNome.replace(/^EMAD\s+/i, '');

    html += '<tr' + (novoGrupo ? ' class="linha-novo-grupo"' : '') + '>';
    if (novoGrupo) {
      html += '<td class="col-fixa" title="' + nomeExibido + '" rowspan="' + qtdNoGrupo + '">' + nomeExibido + '</td>';
    }
    html +=
      '<td class="col-fixa col-fixa2">' + (l.turno === 'MANHA' ? 'Manhã' : l.turno === 'INTER' ? 'Inter' : 'Tarde') + '</td>' +
      '<td class="col-fixa col-fixa3" title="' + (l.pessoaAtiva ? l.pessoaNome : 'Vaga') + '">' + (l.pessoaAtiva ? l.pessoaNome : '<em style="color:var(--texto-suave)">(Vaga)</em>') + '</td>';

    diasDoMes.forEach(function (d) {
      var fimDeSemana = (d.dow === 0 || d.dow === 6);
      var vaga = !l.pessoaAtiva;
      var diaCodigo = DIA_SEMANA_CODIGO[d.dow];
      var foraDaBase = !fimDeSemana && !vaga && l.diasSemana.indexOf(diaCodigo) === -1;
      var ausencia = (fimDeSemana || vaga || foraDaBase) ? null : ausenciaPara(l.pessoaId, l.turno, d.iso);
      var info, codigo, tituloTip;

      if (fimDeSemana) {
        info = { bg: '#e8eaed', cor: '#9aa2ad' };
        codigo = '';
        tituloTip = 'Fim de semana';
      } else if (vaga) {
        info = CODIGO_INFO['Vacância do cargo'];
        codigo = info.codigo;
        tituloTip = 'Vaga — sem profissional';
      } else if (foraDaBase) {
        info = { bg: '#e8eaed', cor: '#9aa2ad' };
        codigo = '';
        tituloTip = 'Não atua nesta base neste dia';
      } else if (ausencia) {
        info = CODIGO_INFO[ausencia.motivo] || CODIGO_NORMAL;
        codigo = info.codigo;
        tituloTip = ausencia.motivo;
      } else {
        info = CODIGO_NORMAL;
        codigo = '<span class="ponto-normal"></span>';
        tituloTip = 'Cobertura normal (sem ausência)';
      }

      var precisaCobertura = ausencia || (vaga && !fimDeSemana);
      var coberturas = precisaCobertura ? alocacoesPara(l.equipeId, l.turno, d.iso) : [];
      var marcador = '';
      if (precisaCobertura) {
        marcador = coberturas.length > 0
          ? '<span class="marcador-ok"></span>'
          : '<span class="marcador-gap"></span>';
      }
      html += '<td class="dia-cel" style="background:' + info.bg + ';color:' + info.cor + '" title="' + tituloTip + '" ' +
        'onclick="abrirModalDia(\'' + l.equipeId + '\',\'' + l.turno + '\',\'' + d.iso + '\',\'' + l.pessoaId + '\')">' +
        codigo + marcador + '</td>';
    });
    html += '</tr>';
  });

  html += '</tbody>';
  document.getElementById('tabela-grade').innerHTML = html;
}

// ---------------- MODAL DO DIA ----------------
var buscaPessoaModalCache = [];

function abrirModalDia(equipeId, turno, dataIso, pessoaIdTitular) {
  var linha = linhasGrade.find(function (l) { return l.equipeId === equipeId && l.turno === turno && l.pessoaId === pessoaIdTitular; });
  var dataObj = new Date(dataIso + 'T00:00:00');
  var fimDeSemana = (dataObj.getDay() === 0 || dataObj.getDay() === 6);
  var vaga = !linha.pessoaAtiva;
  var diaCodigo = DIA_SEMANA_CODIGO[dataObj.getDay()];
  var foraDaBase = !fimDeSemana && !vaga && linha.diasSemana.indexOf(diaCodigo) === -1;
  var ausencia = (fimDeSemana || vaga || foraDaBase) ? null : ausenciaPara(pessoaIdTitular, turno, dataIso);
  var precisaCobertura = ausencia || (vaga && !fimDeSemana);
  var coberturas = precisaCobertura ? alocacoesPara(equipeId, turno, dataIso) : [];
  var turnoLabel = turno === 'MANHA' ? 'Manhã' : turno === 'INTER' ? 'Intermediário' : 'Tarde';

  var statusHtml;
  if (vaga) {
    statusHtml = '<p><strong>Vaga</strong> — posição sem profissional ativo.</p>';
  } else if (fimDeSemana) {
    statusHtml = '<p style="color:var(--texto-suave)">Fim de semana.</p>';
  } else if (foraDaBase) {
    statusHtml = '<p style="color:var(--texto-suave)">Esta pessoa não atua nesta base neste dia da semana.</p>';
  } else if (ausencia) {
    statusHtml = '<p><strong>Ausência:</strong> ' + ausencia.motivo + ' ' +
      '<button class="btn-icon excluir" onclick="excluirAusenciaDaCelula(\'' + ausencia.id + '\')">Excluir ausência</button></p>';
  } else {
    statusHtml = '<p style="color:var(--verde-escuro)"><strong>Sem ausência registrada</strong> (titular presente)</p>';
  }

  var podeRegistrarAusencia = !vaga && !fimDeSemana && !foraDaBase && !ausencia;

  var container = document.getElementById('modal-dia-container');
  container.innerHTML =
    '<div class="modal-overlay" onclick="if(event.target===this) fecharModalDia()">' +
      '<div class="modal-card">' +
        '<button class="modal-fechar" onclick="fecharModalDia()">&times;</button>' +
        '<h3>' + dataIso.split('-').reverse().join('/') + '</h3>' +
        '<p class="modal-sub">' + linha.equipeNome + ' &middot; ' + turnoLabel + ' &middot; ' + (linha.pessoaAtiva ? 'Titular: ' + linha.pessoaNome : 'Vaga (sem profissional)') + '</p>' +
        statusHtml +
        (podeRegistrarAusencia ? renderFormAusenciaRapida(equipeId, turno, dataIso, pessoaIdTitular) : '') +
        (precisaCobertura ? (
          '<hr class="divisor">' +
          '<h4 style="font-size:13px;margin-bottom:8px">Cobertura</h4>' +
          '<div id="lista-coberturas">' + renderListaCoberturas(coberturas, equipeId, turno, dataIso) + '</div>' +
          (coberturas.length === 0 ? renderFormNovaCobertura(equipeId, turno, dataIso, ausencia, vaga) : '')
        ) : '') +
      '</div>' +
    '</div>';
}

function renderFormAusenciaRapida(equipeId, turno, dataIso, pessoaId) {
  return '<hr class="divisor">' +
    '<h4 style="font-size:13px;margin-bottom:8px">Registrar ausência neste dia</h4>' +
    '<div id="ausencia-rapida-erro"></div>' +
    '<div class="form-field">' +
      '<select id="ausencia-rapida-motivo">' +
        '<option>Férias Regulamentares</option>' +
        '<option>Férias Prêmio</option>' +
        '<option>Licença médica</option>' +
        '<option>Licença maternidade</option>' +
        '<option>Licença paternidade</option>' +
        '<option>Licença Gala</option>' +
        '<option>Afastamento INSS</option>' +
        '<option>Falta não justificada</option>' +
        '<option>Pausa Contratual</option>' +
        '<option>Folga</option>' +
        '<option>Folga - Serviço Eleitoral</option>' +
        '<option>Outro</option>' +
      '</select>' +
    '</div>' +
    '<button class="btn-primario" onclick="salvarAusenciaRapida(\'' + equipeId + '\',\'' + turno + '\',\'' + dataIso + '\',\'' + pessoaId + '\')">Registrar</button>';
}

function excluirAusenciaDaCelula(ausenciaId) {
  var a = ausenciasMes.find(function (x) { return x.id === ausenciaId; });
  var aviso = 'Excluir esta ausência?';
  if (a && a.dias && a.dias.length > 1) {
    aviso = 'Esta ausência abrange ' + a.dias.length + ' dias (' + a.dias[0].split('-').reverse().join('/') +
      ' a ' + a.dias[a.dias.length - 1].split('-').reverse().join('/') + '). Excluir vai remover TODOS os dias, não só este. Confirma?';
  }
  if (!confirm(aviso)) return;
  supabaseClient.from('ausencias').delete().eq('id', ausenciaId).then(function (res) {
    if (res.error) { alert('Erro: ' + res.error.message); return; }
    fecharModalDia();
    carregarGrade();
  });
}

function salvarAusenciaRapida(equipeId, turno, dataIso, pessoaId) {
  var motivo = document.getElementById('ausencia-rapida-motivo').value;
  supabaseClient.from('ausencias').insert({
    pessoa_id: pessoaId, equipe_id: equipeId, motivo: motivo, tipo_periodo: 'avulso',
    turno: turno, dias: [dataIso]
  }).then(function (res) {
    if (res.error) {
      document.getElementById('ausencia-rapida-erro').innerHTML = '<p class="msg-erro">Erro: ' + res.error.message + '</p>';
      return;
    }
    fecharModalDia();
    carregarGrade();
  });
}

function renderListaCoberturas(coberturas, equipeId, turno, dataIso) {
  if (coberturas.length === 0) return '<p class="msg-vazio" style="padding:10px 0">Nenhuma cobertura lançada.</p>';
  return coberturas.map(function (c) {
    var tipoLabel = c.tipo === 'cobertura_ferista' ? 'Ferista' : c.tipo === 'cobertura_extra' ? 'Extra' : 'Compensação';
    return '<div id="cobertura-item-' + c.id + '">' +
      '<div class="cobertura-item"><span>' + (c.pessoas ? c.pessoas.nome : '—') + ' &middot; ' + tipoLabel + '</span>' +
      '<span>' +
        '<button class="btn-icon" onclick="mostrarEdicaoCobertura(\'' + c.id + '\',\'' + equipeId + '\',\'' + turno + '\',\'' + dataIso + '\')">Editar</button> ' +
        '<button class="btn-icon excluir" onclick="excluirCobertura(\'' + c.id + '\')">Excluir</button>' +
      '</span></div></div>';
  }).join('');
}


function mostrarEdicaoCobertura(coberturaId, equipeId, turno, dataIso) {
  var c = alocacoesMes.find(function (a) { return a.id === coberturaId; });
  if (!c) return;
  var linha = linhasGrade.find(function (l) { return l.equipeId === equipeId && l.turno === turno; });
  var ausenciaReal = linha ? ausenciaPara(linha.pessoaId, turno, dataIso) : null;
  var extraPermitido = ausenciaReal ? MOTIVOS_PERMITEM_EXTRA.indexOf(ausenciaReal.motivo) !== -1 : true;

  var el = document.getElementById('cobertura-item-' + coberturaId);
  el.innerHTML =
    '<div style="padding:10px 0;border-bottom:1px solid var(--borda)">' +
    '<div class="form-field" style="position:relative">' +
      '<label>Pessoa</label>' +
      '<input id="edit-busca-pessoa-' + coberturaId + '" type="text" value="' + (c.pessoas ? c.pessoas.nome : '') + '" oninput="onBuscaEdicaoInput(\'' + coberturaId + '\')" autocomplete="off">' +
      '<div id="edit-sugestoes-' + coberturaId + '" class="busca-sugestoes" style="display:none"></div>' +
    '</div>' +
    '<div class="form-field">' +
      '<label>Tipo</label>' +
      '<select id="edit-tipo-' + coberturaId + '">' +
        '<option value="cobertura_ferista"' + (c.tipo === 'cobertura_ferista' ? ' selected' : '') + '>Cobertura ferista</option>' +
        (extraPermitido ? '<option value="cobertura_extra"' + (c.tipo === 'cobertura_extra' ? ' selected' : '') + '>Cobertura extra</option>' : '') +
        '<option value="compensacao"' + (c.tipo === 'compensacao' ? ' selected' : '') + '>Compensação</option>' +
      '</select>' +
    '</div>' +
    '<button class="btn-primario" onclick="salvarEdicaoCobertura(\'' + coberturaId + '\',\'' + equipeId + '\',\'' + turno + '\',\'' + dataIso + '\')">Salvar</button>' +
    '</div>';
  window['edicaoPessoaId_' + coberturaId] = c.pessoa_id;
}

function onBuscaEdicaoInput(coberturaId) {
  var termo = document.getElementById('edit-busca-pessoa-' + coberturaId).value.trim();
  termo = normalizarTexto(termo);
  var categoria = document.getElementById('f-categoria').value;
  var sugestoesEl = document.getElementById('edit-sugestoes-' + coberturaId);
  if (!termo) { sugestoesEl.style.display = 'none'; return; }

  carregarPessoasModalSeNecessario(function () {
    var resultados = pessoasCache.filter(function (p) {
      return p.categoria === categoria && normalizarTexto(p.nome).indexOf(termo) !== -1;
    }).slice(0, 8);
    sugestoesEl.innerHTML = resultados.map(function (p) {
      return '<div class="busca-sugestao-item" onclick="selecionarPessoaEdicao(\'' + coberturaId + '\',\'' + p.id + '\',\'' + p.nome.replace(/'/g, "\\'") + '\')">' + p.nome + '</div>';
    }).join('') || '<div class="busca-sugestao-item">Nenhuma pessoa encontrada</div>';
    sugestoesEl.style.display = 'block';
  });
}

function selecionarPessoaEdicao(coberturaId, pessoaId, nome) {
  window['edicaoPessoaId_' + coberturaId] = pessoaId;
  document.getElementById('edit-busca-pessoa-' + coberturaId).value = nome;
  document.getElementById('edit-sugestoes-' + coberturaId).style.display = 'none';
}

function salvarEdicaoCobertura(coberturaId, equipeId, turno, dataIso) {
  var pessoaId = window['edicaoPessoaId_' + coberturaId];
  var tipo = document.getElementById('edit-tipo-' + coberturaId).value;
  supabaseClient.from('alocacoes').update({ pessoa_id: pessoaId, tipo: tipo }).eq('id', coberturaId).then(function (res) {
    if (res.error) { alert('Erro: ' + res.error.message); return; }
    carregarGrade();
    fecharModalDia();
  });
}
function renderFormNovaCobertura(equipeId, turno, dataIso, ausencia, vaga) {
  var extraPermitido = vaga || (ausencia && MOTIVOS_PERMITEM_EXTRA.indexOf(ausencia.motivo) !== -1);
  return '<hr class="divisor">' +
    '<h4 style="font-size:13px;margin-bottom:8px">Adicionar cobertura</h4>' +
    '<div id="modal-form-erro"></div>' +
    '<div class="form-field" style="position:relative">' +
      '<label>Pessoa</label>' +
      '<input id="modal-busca-pessoa" type="text" placeholder="Digite o nome..." oninput="onBuscaModalInput()" autocomplete="off">' +
      '<div id="modal-sugestoes" class="busca-sugestoes" style="display:none"></div>' +
    '</div>' +
    '<div class="form-field">' +
      '<label>Tipo de cobertura</label>' +
      '<select id="modal-tipo">' +
        '<option value="cobertura_ferista">Cobertura ferista</option>' +
        (extraPermitido ? '<option value="cobertura_extra">Cobertura extra</option>' : '') +
        '<option value="compensacao">Compensação</option>' +
      '</select>' +
      (!extraPermitido ? '<div class="aviso-ferista">Este motivo não autoriza plantão extra.</div>' : '') +
    '</div>' +
    '<button class="btn-primario" onclick="salvarCobertura(\'' + equipeId + '\',\'' + turno + '\',\'' + dataIso + '\')">Salvar cobertura</button>';
}

var modalPessoaSelecionadaId = null;

function carregarPessoasModalSeNecessario(callback) {
  if (pessoasCache.length > 0) { callback(); return; }
  supabaseClient.from('pessoas').select('id, nome, categoria').eq('ativo', true).order('nome').then(function (res) {
    pessoasCache = res.data || [];
    callback();
  });
}

function onBuscaModalInput() {
  var termo = document.getElementById('modal-busca-pessoa').value.trim();
  termo = normalizarTexto(termo);
  var categoria = document.getElementById('f-categoria').value;
  var sugestoesEl = document.getElementById('modal-sugestoes');
  modalPessoaSelecionadaId = null;
  if (!termo) { sugestoesEl.style.display = 'none'; return; }

  carregarPessoasModalSeNecessario(function () {
    var resultados = pessoasCache.filter(function (p) {
      return p.categoria === categoria && normalizarTexto(p.nome).indexOf(termo) !== -1;
    }).slice(0, 8);
    sugestoesEl.innerHTML = resultados.map(function (p) {
      return '<div class="busca-sugestao-item" onclick="selecionarPessoaModal(\'' + p.id + '\',\'' + p.nome.replace(/'/g, "\\'") + '\')">' + p.nome + '</div>';
    }).join('') || '<div class="busca-sugestao-item">Nenhuma pessoa encontrada</div>';
    sugestoesEl.style.display = 'block';
  });
}

function selecionarPessoaModal(id, nome) {
  modalPessoaSelecionadaId = id;
  document.getElementById('modal-busca-pessoa').value = nome;
  document.getElementById('modal-sugestoes').style.display = 'none';
}

function salvarCobertura(equipeId, turno, dataIso) {
  var erroEl = document.getElementById('modal-form-erro');
  erroEl.innerHTML = '';
  if (!modalPessoaSelecionadaId) { erroEl.innerHTML = '<p class="msg-erro">Selecione uma pessoa.</p>'; return; }
  var tipo = document.getElementById('modal-tipo').value;

  supabaseClient.from('alocacoes').insert({
    equipe_id: equipeId, data: dataIso, turno: turno, pessoa_id: modalPessoaSelecionadaId, tipo: tipo
  }).then(function (res) {
    if (res.error) {
      erroEl.innerHTML = '<p class="msg-erro">Erro: ' + res.error.message + '</p>';
      return;
    }
    fecharModalDia();
    carregarGrade();
  });
}

function excluirCobertura(id) {
  if (!confirm('Excluir esta cobertura?')) return;
  supabaseClient.from('alocacoes').delete().eq('id', id).then(function (res) {
    if (res.error) { alert('Erro: ' + res.error.message); return; }
    fecharModalDia();
    carregarGrade();
  });
}

function fecharModalDia() {
  document.getElementById('modal-dia-container').innerHTML = '';
}

authReady(initTela);
</script>
</body>
</html>
