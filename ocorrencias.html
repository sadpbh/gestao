<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocorrências · Cobertura de Escalas · SAD BH</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="supabase-client.js"></script>
<script src="auth.js"></script>
<script src="nav.js"></script>
<style>
  .busca-wrap { position: relative; }
  .busca-sugestoes {
    position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid var(--borda);
    border-radius: 8px; margin-top: 4px; max-height: 220px; overflow-y: auto; z-index: 20;
    box-shadow: 0 8px 24px rgba(0,0,0,.08);
  }
  .busca-sugestao-item { padding: 9px 14px; font-size: 13px; cursor: pointer; }
  .busca-sugestao-item:hover { background: var(--bg); }
  .pessoa-selecionada {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #c8f4da;
    border-radius: 8px; font-size: 14px; margin-bottom: 4px;
  }
  .pessoa-selecionada button { margin-left: auto; }
  textarea.form-control-like {
    width: 100%; padding: 9px 12px; border: 1.5px solid #d0d7e3; border-radius: 8px;
    font-size: 14px; font-family: inherit; outline: none; min-height: 90px; resize: vertical;
  }
  .badge-tipo-Elogio { background: #c8f4da; color: var(--verde-escuro); }
  .badge-tipo-AdvertenciaVerbal { background: #fbf1d7; color: #8a6d10; }
  .badge-tipo-AdvertenciaEscrita { background: #fbcda0; color: #a2551e; }
  .badge-tipo-TermodeApontamento { background: #ddc3f7; color: #5b2f90; }
  .badge-tipo-Suspensao { background: #f9c9c2; color: #b0301f; }
  .badge-tipo-LicencaMedica { background: #bfe0fb; color: #0f4c8f; }
  .badge-tipo-Outro { background: #d5dbe0; color: #42545e; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>Ocorrências</h1>
    <div class="sub">Cobertura de Escalas &middot; SAD BH</div>
  </div>
  <div id="nav-menu"></div>
  <div class="topbar-user">
    <span id="user-label"></span>
    <button class="btn-sair" onclick="authLogout()">Sair</button>
  </div>
</div>

<div class="container" id="app" style="display:none">

  <div class="card" id="card-restrito" style="display:none">
    <p class="msg-erro">Esta tela é restrita ao perfil gestor.</p>
  </div>

  <div id="conteudo" style="display:none">

    <div class="card">
      <h2 id="titulo-form">Registrar ocorrência</h2>
      <div id="form-erro"></div>

      <div class="form-field busca-wrap">
        <label>Pessoa</label>
        <div id="pessoa-selecionada-area"></div>
        <input id="busca-pessoa" type="text" placeholder="Digite o nome..." autocomplete="off">
        <div id="busca-sugestoes" class="busca-sugestoes" style="display:none"></div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label>Tipo</label>
          <select id="oc-tipo">
            <option>Advertência Verbal</option>
            <option>Advertência Escrita</option>
            <option>Termo de Apontamento</option>
            <option>Suspensão</option>
            <option>Elogio</option>
            <option>Licença Médica</option>
            <option>Outro</option>
          </select>
        </div>
        <div class="form-field">
          <label>Data da ocorrência</label>
          <input id="oc-data" type="date">
        </div>
      </div>

      <div class="form-field">
        <label>Descrição</label>
        <textarea id="oc-descricao" class="form-control-like" placeholder="Descreva a ocorrência detalhadamente..."></textarea>
      </div>

      <div style="margin-top:16px;display:flex;gap:10px">
        <button class="btn-primario" id="btn-salvar" onclick="salvarOcorrencia()">Registrar ocorrência</button>
        <button class="btn-secundario" id="btn-cancelar" style="display:none" onclick="cancelarEdicao()">Cancelar edição</button>
      </div>
    </div>

    <div class="card">
      <div class="form-row" style="align-items:end;margin-bottom:16px">
        <div class="form-field">
          <label>Buscar por pessoa</label>
          <input id="busca-lista" type="text" placeholder="Digite para filtrar..." oninput="renderTabela()">
        </div>
        <div class="form-field">
          <label>Tipo</label>
          <select id="filtro-tipo" onchange="renderTabela()">
            <option value="">Todos os tipos</option>
            <option>Advertência Verbal</option>
            <option>Advertência Escrita</option>
            <option>Termo de Apontamento</option>
            <option>Suspensão</option>
            <option>Elogio</option>
            <option>Licença Médica</option>
            <option>Outro</option>
          </select>
        </div>
      </div>
      <h2>Ocorrências registradas (<span id="contador">0</span>)</h2>
      <table>
        <thead>
          <tr><th>Pessoa</th><th>Tipo</th><th>Descrição</th><th>Data</th><th></th></tr>
        </thead>
        <tbody id="tabela-body"></tbody>
      </table>
      <div id="tabela-vazio" class="msg-vazio" style="display:none">Nenhuma ocorrência encontrada.</div>
    </div>

  </div>
</div>

<script>
var pessoasCache = [];
var ocorrenciasCache = [];
var pessoaSelecionada = null;
var idEmEdicao = null;

function initTela() {
  document.getElementById('app').style.display = 'block';
  var acesso = window.meuAcesso;
  var rotulo = acesso.equipe_nome || acesso.pessoa_nome || acesso.email;
  document.getElementById('user-label').textContent = rotulo + ' (' + acesso.perfil + ')';
  renderNav('ocorrencias');

  if (acesso.perfil !== 'gestor') {
    document.getElementById('card-restrito').style.display = 'block';
    return;
  }
  document.getElementById('conteudo').style.display = 'block';

  document.getElementById('busca-pessoa').addEventListener('input', onBuscaPessoaInput);
  document.addEventListener('click', function (e) {
    if (!e.target.closest('.busca-wrap')) {
      document.getElementById('busca-sugestoes').style.display = 'none';
    }
  });

  carregarPessoas().then(carregarOcorrencias);
}

function carregarPessoas() {
  return supabaseClient.from('pessoas').select('id, nome').eq('ativo', true).order('nome').then(function (res) {
    pessoasCache = res.data || [];
  });
}

function onBuscaPessoaInput() {
  var termo = document.getElementById('busca-pessoa').value.trim().toLowerCase();
  var sugestoesEl = document.getElementById('busca-sugestoes');
  if (!termo) { sugestoesEl.style.display = 'none'; return; }

  var resultados = pessoasCache.filter(function (p) {
    return p.nome.toLowerCase().indexOf(termo) !== -1;
  }).slice(0, 8);

  sugestoesEl.innerHTML = (resultados.length ? resultados.map(function (p) {
    return '<div class="busca-sugestao-item" onclick="selecionarPessoa(\'' + p.id + '\')">' + p.nome + '</div>';
  }).join('') : '<div class="busca-sugestao-item">Nenhuma pessoa encontrada</div>');
  sugestoesEl.style.display = 'block';
}

function selecionarPessoa(id) {
  pessoaSelecionada = pessoasCache.find(function (p) { return p.id === id; });
  document.getElementById('busca-sugestoes').style.display = 'none';
  document.getElementById('busca-pessoa').value = '';
  document.getElementById('busca-pessoa').style.display = 'none';
  document.getElementById('pessoa-selecionada-area').innerHTML =
    '<div class="pessoa-selecionada">' + pessoaSelecionada.nome +
    '<button class="btn-icon" onclick="limparPessoaSelecionada()">trocar</button></div>';
}

function limparPessoaSelecionada() {
  pessoaSelecionada = null;
  document.getElementById('pessoa-selecionada-area').innerHTML = '';
  document.getElementById('busca-pessoa').style.display = 'block';
  document.getElementById('busca-pessoa').value = '';
}

function salvarOcorrencia() {
  var erroEl = document.getElementById('form-erro');
  erroEl.innerHTML = '';

  if (!pessoaSelecionada) { erroEl.innerHTML = '<p class="msg-erro">Selecione uma pessoa.</p>'; return; }
  var tipo = document.getElementById('oc-tipo').value;
  var data = document.getElementById('oc-data').value;
  var descricao = document.getElementById('oc-descricao').value.trim();

  if (!data) { erroEl.innerHTML = '<p class="msg-erro">Informe a data da ocorrência.</p>'; return; }
  if (!descricao) { erroEl.innerHTML = '<p class="msg-erro">Informe a descrição.</p>'; return; }

  var payload = {
    pessoa_id: pessoaSelecionada.id,
    tipo: tipo,
    data_ocorrencia: data,
    descricao: descricao,
    registrado_por: window.meuAcesso.email
  };

  var query = idEmEdicao
    ? supabaseClient.from('ocorrencias').update(payload).eq('id', idEmEdicao)
    : supabaseClient.from('ocorrencias').insert(payload);

  query.then(function (res) {
    if (res.error) {
      erroEl.innerHTML = '<p class="msg-erro">Erro ao salvar: ' + res.error.message + '</p>';
      return;
    }
    cancelarEdicao();
    carregarOcorrencias();
  });
}

function iniciarEdicao(id) {
  var o = ocorrenciasCache.find(function (x) { return x.id === id; });
  if (!o) return;

  idEmEdicao = id;
  document.getElementById('titulo-form').textContent = 'Editar ocorrência';
  document.getElementById('btn-salvar').textContent = 'Salvar edição';
  document.getElementById('btn-cancelar').style.display = 'inline-block';

  var pessoa = pessoasCache.find(function (p) { return p.id === o.pessoa_id; });
  if (pessoa) selecionarPessoa(pessoa.id);

  document.getElementById('oc-tipo').value = o.tipo;
  document.getElementById('oc-data').value = o.data_ocorrencia;
  document.getElementById('oc-descricao').value = o.descricao;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelarEdicao() {
  idEmEdicao = null;
  document.getElementById('titulo-form').textContent = 'Registrar ocorrência';
  document.getElementById('btn-salvar').textContent = 'Registrar ocorrência';
  document.getElementById('btn-cancelar').style.display = 'none';
  limparPessoaSelecionada();
  document.getElementById('oc-tipo').value = 'Advertência Verbal';
  document.getElementById('oc-data').value = '';
  document.getElementById('oc-descricao').value = '';
}

function carregarOcorrencias() {
  supabaseClient
    .from('ocorrencias')
    .select('id, pessoa_id, tipo, descricao, data_ocorrencia, registrado_por, pessoas(nome)')
    .order('data_ocorrencia', { ascending: false })
    .then(function (res) {
      if (res.error) {
        document.getElementById('form-erro').innerHTML = '<p class="msg-erro">Erro ao carregar: ' + res.error.message + '</p>';
        return;
      }
      ocorrenciasCache = res.data || [];
      renderTabela();
    });
}

function classeBadge(tipo) {
  return 'badge-tipo-' + tipo.replace(/[^a-zA-Z]/g, '');
}

function renderTabela() {
  var termo = document.getElementById('busca-lista').value.trim().toLowerCase();
  var tipoFiltro = document.getElementById('filtro-tipo').value;

  var lista = ocorrenciasCache.filter(function (o) {
    var nome = o.pessoas ? o.pessoas.nome.toLowerCase() : '';
    var matchNome = !termo || nome.indexOf(termo) !== -1;
    var matchTipo = !tipoFiltro || o.tipo === tipoFiltro;
    return matchNome && matchTipo;
  });

  document.getElementById('contador').textContent = lista.length;
  var body = document.getElementById('tabela-body');
  var vazio = document.getElementById('tabela-vazio');

  if (lista.length === 0) {
    body.innerHTML = '';
    vazio.style.display = 'block';
    return;
  }
  vazio.style.display = 'none';

  body.innerHTML = lista.map(function (o) {
    var descCurta = o.descricao.length > 80 ? o.descricao.slice(0, 80) + '…' : o.descricao;
    return '<tr>' +
      '<td>' + (o.pessoas ? o.pessoas.nome : '—') + '</td>' +
      '<td><span class="badge ' + classeBadge(o.tipo) + '">' + o.tipo + '</span></td>' +
      '<td title="' + o.descricao.replace(/"/g, '&quot;') + '">' + descCurta + '</td>' +
      '<td>' + o.data_ocorrencia.split('-').reverse().join('/') + '</td>' +
      '<td>' +
        '<button class="btn-icon" onclick="iniciarEdicao(\'' + o.id + '\')">Editar</button> ' +
        '<button class="btn-icon excluir" onclick="excluirOcorrencia(\'' + o.id + '\')">Excluir</button>' +
      '</td>' +
      '</tr>';
  }).join('');
}

function excluirOcorrencia(id) {
  if (!confirm('Excluir esta ocorrência?')) return;
  supabaseClient.from('ocorrencias').delete().eq('id', id).then(function (res) {
    if (res.error) { alert('Erro: ' + res.error.message); return; }
    carregarOcorrencias();
  });
}

authReady(initTela);
</script>
</body>
</html>
